slam_toolbox:
  ros__parameters:
    # Frame names - set odom to base_link since we have no odometry
    odom_frame: base_link
    map_frame: map
    base_frame: base_link
    
    # Scan matching - crucial for no odometry!
    use_scan_matching: true
    use_scan_barycenter: true
    
    # Make it responsive for handheld
    minimum_time_interval: 0.1
    minimum_travel_distance: 0.01
    minimum_travel_heading: 0.01
    
    # Basic settings
    scan_topic: /scan
    mode: mapping
    resolution: 0.05
